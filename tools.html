  <meta property="og:title" content="AI Tools Directory — Discover the Best AI Tools" />
  <meta property="og:description" content="Curated directory of the best AI tools for writing, coding, image generation, video creation, and more." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://2193824842-spec.github.io/ai-pulse/tools.html" />
  <meta property="og:image" content="https://2193824842-spec.github.io/ai-pulse/favicon.svg" />
  <meta property="og:site_name" content="AI Pulse" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="AI Tools Directory — Discover the Best AI Tools" />
  <meta name="twitter:description" content="Curated directory of the best AI tools for writing, coding, image generation, video creation, and more." />
  <meta name="twitter:image" content="https://2193824842-spec.github.io/ai-pulse/favicon.svg" />
  <link rel="icon" href="/ai-pulse/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/style.css?v=3" />
  <style>
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-top: 32px;
    }
    .tool-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border-color: var(--primary-color);
    }
    .tool-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }
    .tool-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-color);
    }
    .tool-description {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .tool-category {
      display: inline-block;
      font-size: 12px;
      padding: 4px 12px;
      background: var(--tag-bg);
      color: var(--primary-color);
      border-radius: 12px;
      font-weight: 500;
    }
    .tool-card.hidden {
      display: none;
    }
    @media (max-width: 768px) {
      .tools-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="/ai-pulse/" class="logo">AI Pulse</a>
      <nav>
        <a href="/ai-pulse/">Home</a>
        <a href="/ai-pulse/blog.html">Blog</a>
        <a href="/ai-pulse/tools.html" class="active">Tools</a>
        <a href="/ai-pulse/about.html">About</a>
      <span class="lang-switcher"><span class="lang-active">EN</span><a href="/ai-pulse/zh/tools.html" class="lang-link">中</a></span>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="hero-compact">
      <div class="blog-header">
        <div>
          <h1>AI Tools Directory</h1>
          <p>Discover the best AI tools for your workflow</p>
        </div>
        <div class="sort-toggle">
          <button class="sort-btn active" data-sort="latest">Latest</button>
          <button class="sort-btn" data-sort="popular">Popular</button>
        </div>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search tools..." autocomplete="off" />
      </div>
    </div>

    <div class="filters-row">
      <div class="cat-list cat-list-horizontal">
        <button class="cat-btn active" data-category="all">All</button>
        <button class="cat-btn" data-category="AI Writing">AI Writing</button>
        <button class="cat-btn" data-category="AI Image">AI Image</button>
        <button class="cat-btn" data-category="AI Video">AI Video</button>
        <button class="cat-btn" data-category="AI Coding">AI Coding</button>
        <button class="cat-btn" data-category="AI Audio">AI Audio</button>
        <button class="cat-btn" data-category="AI Search">AI Search</button>
      </div>
    </div>

    <div class="tools-grid" id="tools-container">
      <!-- Tools will be loaded here -->
    </div>
  </main>

  <footer>
    <div class="container footer-inner">
      <div class="footer-left">
        <p>&copy; 2026 AI Pulse. All rights reserved.</p>
      </div>
      <div class="footer-right">
        <a href="/ai-pulse/about.html">About</a>
        <a href="/ai-pulse/blog.html">Blog</a>
        <a href="/ai-pulse/tools.html">Tools</a>
      </div>
    </div>
  </footer>

  <script>
    let allTools = [];
    let currentCategory = 'all';
    let currentSort = 'latest';
    let searchQuery = '';

    async function loadTools() {
      try {
        const response = await fetch('/ai-pulse/tools/index.json');
        allTools = await response.json();
        renderTools();
      } catch (error) {
        console.error('Failed to load tools:', error);
      }
    }

    function renderTools() {
      const container = document.getElementById('tools-container');
      let filtered = currentCategory === 'all'
        ? [...allTools]
        : allTools.filter(tool => tool.category === currentCategory);

      // Search filter
      if (searchQuery) {
        filtered = filtered.filter(tool =>
          tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          tool.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
          tool.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()))
        );
      }

      // Sort
      if (currentSort === 'popular') {
        filtered.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
      } else {
        filtered.sort((a, b) => (b.addedDate || '').localeCompare(a.addedDate || ''));
      }

      container.innerHTML = filtered.map(tool => `
        <a href="${tool.url}" target="_blank" rel="noopener noreferrer" class="tool-card">
          <span class="tool-icon">${tool.icon}</span>
          <h3 class="tool-name">${tool.name}</h3>
          <p class="tool-description">${tool.description}</p>
          <span class="tool-category">${tool.category}</span>
        </a>
      `).join('');

      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No tools found</p>';
      }
    }

    // Category filter
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        renderTools();
      });
    });

    // Sort toggle
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        renderTools();
      });
    });

    // Search
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderTools();
    });

    loadTools();
  </script>
</body>
</html>
