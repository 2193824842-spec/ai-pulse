name: Daily AI News

on:
  schedule:
    # 每天 04:00 UTC = 北京时间 12:00
    - cron: '0 4 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Checkout seo-farm scripts
        uses: actions/checkout@v4
        with:
          repository: 2193824842-spec/seo-farm
          token: ${{ secrets.GH_PAT }}
          path: seo-farm-scripts
          sparse-checkout: |
            scripts/build_daily.py
            config.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser openai json-repair requests pyyaml

      - name: Write config
        run: |
          cat > seo-farm-scripts/config.yaml << 'EOF'
          api:
            base_url: ${{ secrets.API_BASE_URL }}
            api_key: ${{ secrets.API_KEY }}
            model_fast: claude-haiku-4-5-20251001
          serper:
            api_key: ${{ secrets.SERPER_KEY }}
          EOF

      - name: Run build_daily.py
        run: |
          cd seo-farm-scripts
          python scripts/build_daily.py --dry-run=false
        env:
          SITE_DIR: ${{ github.workspace }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily.html zh/daily.html
          git diff --cached --quiet || git commit -m "daily: $(date -u +%Y-%m-%d) AI news update"
          git push
