<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — ai.blog</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="/my-seo-site/" class="logo">ai.blog</a>
      <nav>
        <a href="/my-seo-site/">Articles</a>
        <a href="https://github.com/2193824842-spec/my-seo-site" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <a href="/my-seo-site/" class="back-link">← Back to articles</a>

    <div class="article-header">
      <div class="post-meta">
        <span class="post-date">{{DATE}}</span>
        {{LEVEL_BADGE}}
      </div>
      <h1>{{TITLE}}</h1>
      <div class="post-tags">
        {{TAGS}}
      </div>
    </div>

    <div class="article-body">
      {{CONTENT}}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Auto-generated by AI · <a href="https://github.com/2193824842-spec/my-seo-site" target="_blank">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
