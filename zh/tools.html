  <script>
    let allTools = [];
    let currentCategory = 'all';
    let currentPricing = 'all';
    let currentSort = 'latest';
    let searchQuery = '';
    let compareList = [];

    async function loadTools() {
      try {
        const response = await fetch('tools/index.json');
        allTools = await response.json();
        renderTools();
      } catch (error) {
        console.error('加载工具失败:', error);
      }
    }

    function renderTools() {
      const container = document.getElementById('tools-container');
      let filtered = currentCategory === 'all'
        ? [...allTools]
        : allTools.filter(tool => (tool.categories || [tool.category]).includes(currentCategory));

      if (currentPricing === 'free') {
        filtered = filtered.filter(tool => { const m = typeof tool.pricing === 'object' ? tool.pricing.model : tool.pricing; return m === 'free' || m === 'freemium'; });
      } else if (currentPricing !== 'all') {
        filtered = filtered.filter(tool => { const m = typeof tool.pricing === 'object' ? tool.pricing.model : tool.pricing; return m === currentPricing; });
      }

      if (searchQuery) {
        filtered = filtered.filter(tool =>
          tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          tool.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
          tool.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()))
        );
      }

      if (currentSort === 'popular') {
        filtered.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
      } else {
        filtered.sort((a, b) => (b.addedDate || '').localeCompare(a.addedDate || ''));
      }

      container.innerHTML = filtered.map(tool => {
        try {
          const domain = tool.favicon_domain || new URL(tool.url).hostname;
          const logoUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
          const badges = [];
          if (tool.featured) badges.push('<span class="tool-badge badge-hot">热门</span>');
          if (tool.addedDate) {
            const days = Math.floor((new Date() - new Date(tool.addedDate)) / 86400000);
            if (days >= 0 && days <= 7) badges.push('<span class="tool-badge badge-new">新上线</span>');
          }
          const pm = typeof tool.pricing === 'object' ? tool.pricing.model : tool.pricing;
          if (pm === 'free') badges.push('<span class="tool-badge badge-free">免费</span>');
          else if (pm === 'freemium') badges.push('<span class="tool-badge badge-freemium">免费增值</span>');

          const inCompare = compareList.some(t => t.name === tool.name);
          const btnLabel = inCompare ? '✓ 已添加' : '+ 对比';
          const btnClass = inCompare ? 'compare-btn selected' : 'compare-btn';

          const detailSlug = tool.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
          const detailUrl = `tools/${detailSlug}.html`;
          return `
          <div class="tool-card-wrap" style="position:relative;">
            <a href="${detailUrl}" class="tool-card" onclick="gtag('event','tool_click',{tool_name:'${tool.name}',tool_category:'${tool.category}'})">
              ${badges.length > 0 ? `<div class="tool-badges">${badges.join('')}</div>` : ''}
              <img src="${logoUrl}" alt="${tool.name}" class="tool-logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22%3E%3Crect width=%2248%22 height=%2248%22 fill=%22%23e0e0e0%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2220%22 fill=%22%23999%22%3E${tool.name.charAt(0)}%3C/text%3E%3C/svg%3E'" />
              <h3 class="tool-name">${tool.name}</h3>
              <p class="tool-description">${tool.description}</p>
            </a>
            <button class="${btnClass}" onclick="toggleCompare(event, '${tool.name}')">${btnLabel}</button>
          </div>`;
        } catch (e) { return ''; }
      }).join('');

      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">未找到工具</p>';
      }
    }

    function toggleCompare(e, toolName) {
      e.preventDefault();
      e.stopPropagation();
      const tool = allTools.find(t => t.name === toolName);
      if (!tool) return;
      const idx = compareList.findIndex(t => t.name === toolName);
      if (idx > -1) {
        compareList.splice(idx, 1);
      } else {
        if (compareList.length >= 3) { alert('最多同时对比 3 个工具。'); return; }
        compareList.push(tool);
      }
      renderTools();
      updateCompareBar();
    }

    function updateCompareBar() {
      const bar = document.getElementById('compare-bar');
      const slots = document.getElementById('compare-slots');
      const btn = document.getElementById('btn-compare-now');
      if (compareList.length === 0) { bar.classList.remove('visible'); return; }
      bar.classList.add('visible');
      btn.disabled = compareList.length < 2;
      slots.innerHTML = compareList.map(tool => {
        const domain = (() => { try { return tool.favicon_domain || new URL(tool.url).hostname; } catch(e) { return ''; } })();
        const logo = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '';
        return `<div class="compare-slot filled">
          <img src="${logo}" alt="${tool.name}" onerror="this.style.display='none'" />
          <span>${tool.name}</span>
          <span class="compare-slot-remove" onclick="toggleCompare(event, '${tool.name}')">&times;</span>
        </div>`;
      }).join('');
      for (let i = compareList.length; i < 3; i++) {
        slots.innerHTML += `<div class="compare-slot">+ 添加工具</div>`;
      }
    }

    function showCompareModal() {
      if (compareList.length < 2) return;
      const wrap = document.getElementById('compare-table-wrap');
      const pricingModel = t => typeof t.pricing === 'object' ? t.pricing.model : t.pricing;
      const pricingLabel = {free:'✅ 免费', freemium:'🔓 免费增值', paid:'💳 付费'};
      const rows = [
        { label: '简介',     fn: t => `<span style="font-size:12px;line-height:1.5;">${t.description || '—'}</span>` },
        { label: '推荐人群', fn: t => t.recommended_for ? `<span class="compare-recommended">${t.recommended_for}</span>` : '—' },
        { label: '所属公司', fn: t => t.company || '—' },
        { label: '分类',     fn: t => t.category || '—' },
        { label: '定价',     fn: t => pricingLabel[pricingModel(t)] || '—' },
        { label: '套餐',     fn: t => {
          const plans = (typeof t.pricing === 'object' ? t.pricing.plans : null) || [];
          if (!plans.length) return '—';
          return plans.map(p => `<div class="compare-plan"><strong>${p.name}</strong> <span>${p.price}</span></div>`).join('');
        }},
        { label: '适合人群', fn: t => (t.best_for || []).length ? '<ul class="compare-list">' + (t.best_for || []).map(x => `<li>${x}</li>`).join('') + '</ul>' : '—' },
        { label: '核心功能', fn: t => (t.features || []).length ? '<ul class="compare-list">' + (t.features || []).map(x => `<li>${x}</li>`).join('') + '</ul>' : '—' },
        { label: '优点',     fn: t => (t.pros || []).length ? '<ul class="compare-list compare-pros">' + (t.pros || []).map(x => `<li>${x}</li>`).join('') + '</ul>' : '—' },
        { label: '缺点',     fn: t => (t.cons || []).length ? '<ul class="compare-list compare-cons">' + (t.cons || []).map(x => `<li>${x}</li>`).join('') + '</ul>' : '—' },
        { label: '热度',     fn: t => { const s = Math.round((t.popularity || 0) / 20); return '<span class="compare-stars">' + '★'.repeat(s) + '☆'.repeat(5-s) + '</span> ' + (t.popularity || 0); } },
        { label: '标签',     fn: t => (t.tags || []).map(tag => `<span class="compare-tag">${tag}</span>`).join('') },
        { label: '访问',     fn: t => `<a href="${t.url}" target="_blank" rel="noopener noreferrer" class="compare-visit">访问 →</a>` },
      ];
      wrap.innerHTML = `<table class="compare-table">
        <thead><tr>
          <th></th>
          ${compareList.map(t => {
            const domain = (() => { try { return t.favicon_domain || new URL(t.url).hostname; } catch(e) { return ''; } })();
            const logo = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '';
            return `<th class="tool-header"><img src="${logo}" alt="${t.name}" onerror="this.style.display='none'" /><span>${t.name}</span></th>`;
          }).join('')}
        </tr></thead>
        <tbody>
          ${rows.map(row => `<tr><td>${row.label}</td>${compareList.map(t => `<td>${row.fn(t)}</td>`).join('')}</tr>`).join('')}
        </tbody>
      </table>`;
      document.getElementById('compare-overlay').classList.add('visible');
    }

    document.getElementById('btn-compare-now').addEventListener('click', showCompareModal);
    document.getElementById('btn-compare-clear').addEventListener('click', () => {
      compareList = []; renderTools(); updateCompareBar();
    });
    document.getElementById('compare-modal-close').addEventListener('click', () => {
      document.getElementById('compare-overlay').classList.remove('visible');
    });
    document.getElementById('compare-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('visible');
    });
    document.getElementById('compare-hint-close').addEventListener('click', () => {
      document.getElementById('compare-hint').style.display = 'none';
    });

    document.querySelectorAll('[data-category]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        renderTools();
      });
    });

    document.querySelectorAll('[data-pricing]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-pricing]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPricing = btn.dataset.pricing;
        renderTools();
      });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        renderTools();
      });
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderTools();
    });

    loadTools();

    // 侧边栏目录逻辑
    const sidebarNav = document.getElementById('sidebar-nav');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const sidebarClose = document.getElementById('sidebar-close');
    const sidebarToggleIcon = document.getElementById('sidebar-toggle-icon');
    const filtersRow = document.querySelector('.filters-row');

    // 滚动检测：当 filters-row 滚出视野时显示侧边栏
    function checkSidebarVisibility() {
      if (!filtersRow) return;
      const rect = filtersRow.getBoundingClientRect();
      // 当 filters-row 完全滚出顶部时显示侧边栏
      if (rect.bottom < 0) {
        sidebarNav.classList.add('visible');
      } else {
        sidebarNav.classList.remove('visible');
        sidebarNav.classList.remove('expanded');
        sidebarToggleIcon.textContent = '☰';
      }
    }

    window.addEventListener('scroll', checkSidebarVisibility, { passive: true });
    checkSidebarVisibility();

    // 展开/收起侧边栏
    sidebarToggle.addEventListener('click', () => {
      const isExpanded = sidebarNav.classList.toggle('expanded');
      sidebarToggleIcon.textContent = isExpanded ? '✕' : '☰';
    });

    sidebarClose.addEventListener('click', () => {
      sidebarNav.classList.remove('expanded');
      sidebarToggleIcon.textContent = '☰';
    });

    // 侧边栏分类点击
    document.querySelectorAll('[data-sidebar-category]').forEach(btn => {
      btn.addEventListener('click', () => {
        // 更新侧边栏按钮状态
        document.querySelectorAll('[data-sidebar-category]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // 同步到主筛选按钮
        const category = btn.dataset.sidebarCategory;
        document.querySelectorAll('[data-category]').forEach(b => {
          b.classList.toggle('active', b.dataset.category === category);
        });
        currentCategory = category;
        renderTools();
      });
    });

    // 侧边栏价格点击
    document.querySelectorAll('[data-sidebar-pricing]').forEach(btn => {
      btn.addEventListener('click', () => {
        // 更新侧边栏按钮状态
        document.querySelectorAll('[data-sidebar-pricing]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // 同步到主筛选按钮
        const pricing = btn.dataset.sidebarPricing;
        document.querySelectorAll('[data-pricing]').forEach(b => {
          b.classList.toggle('active', b.dataset.pricing === pricing);
        });
        currentPricing = pricing;
        renderTools();
      });
    });

    // 主筛选按钮变化时同步侧边栏
    document.querySelectorAll('[data-category]').forEach(btn => {
      btn.addEventListener('click', () => {
        const category = btn.dataset.category;
        document.querySelectorAll('[data-sidebar-category]').forEach(b => {
          b.classList.toggle('active', b.dataset.sidebarCategory === category);
        });
      });
    });

    document.querySelectorAll('[data-pricing]').forEach(btn => {
      btn.addEventListener('click', () => {
        const pricing = btn.dataset.pricing;
        document.querySelectorAll('[data-sidebar-pricing]').forEach(b => {
          b.classList.toggle('active', b.dataset.sidebarPricing === pricing);
        });
      });
    });
  </script>
</body>
</html>
