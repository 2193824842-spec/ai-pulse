<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Blog — Latest AI News & Insights</title>
  <meta name="description" content="Daily AI news, tutorials, and insights covering OpenAI, Claude, and the latest in artificial intelligence." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="/my-seo-site/" class="logo">ai.blog</a>
      <nav>
        <a href="/my-seo-site/">Articles</a>
        <a href="https://github.com/2193824842-spec/my-seo-site" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="hero">
      <div class="hero-row">
        <div class="hero-left">
          <h1>AI News & Insights</h1>
          <p>Daily articles on AI tools, models, and industry updates — auto-generated and curated.</p>
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search articles..." autocomplete="off" />
          </div>
          <div class="filters">
            <button class="filter-btn tag-btn active" data-tag="all">All</button>
          </div>
        </div>
        <div class="cat-list">
          <button class="cat-btn active" data-cat="all">All</button>
          <button class="cat-btn" data-cat="Model Comparison">Model Comparison</button>
          <button class="cat-btn" data-cat="Product Analysis">Product Analysis</button>
          <button class="cat-btn" data-cat="Industry Analysis">Industry Analysis</button>
          <button class="cat-btn" data-cat="Research & Innovation">Research & Innovation</button>
          <button class="cat-btn" data-cat="Tool Guide">Tool Guide</button>
          <button class="cat-btn" data-cat="Opinion">Opinion</button>
        </div>
      </div>
    </div>

    <div id="post-list" class="post-list">
      <div class="loading">Loading articles...</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Auto-generated by AI · <a href="https://github.com/2193824842-spec/my-seo-site" target="_blank">GitHub</a></p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
